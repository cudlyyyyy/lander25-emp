<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empfohlen - Geld verdienen beim Testen von Spielen</title>
</head>
<body>

<div class="container">
    <div class="header">
        <!-- UPDATED IMAGE -->
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKWQiW4K9QalQD4JL4N4JbkoxPGDm2r6DJDg&s" alt="Empfohlen" class="logo">

        <div class="hero-text">Geld verdienen beim Spielen!</div>
        <div class="subtitle">Verwandle deine Spielzeit in echtes Geld</div>
    </div>

    <div class="cta-section">
        <button id="downloadBtn">🚀 JETZT GELD VERDIENEN</button>
    </div>
</div>

<script>
function getUrlParameter(name) {
    name = name.replace(/[\\[]/, '\\[').replace(/[\\]]/, '\\]');
    const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
    const results = regex.exec(location.search);
    return results === null ? '' : decodeURIComponent(results[1].replace(/\\+/g, ' '));
}

function setupDownloadButton() {
    const sub2Param = getUrlParameter('sub2');

    // ✅ UPDATED AFFILIATE LINK
    let finalUrl = 'https://raintrcks.com/r/eyJ0IjoiZW1wZm9obGVuIiwidSI6IjY5YTEwOTZkYTA5OGFmODc1MWVkNzIyNiIsInRzIjoxNzc1NzQ0ODgyNzE1fQ';

    if (sub2Param) {
        const separator = finalUrl.includes('?') ? '&' : '?';
        finalUrl += separator + 'sub2=' + encodeURIComponent(sub2Param);
    }

    document.getElementById('downloadBtn').addEventListener('click', function () {
        window.open(finalUrl, '_blank');
    });
}

setupDownloadButton();
</script>

</body>
</html>
